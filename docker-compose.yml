services:
  api:
    build: .
    container_name: fastgram_api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8003:8000"
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
      - ./sessions:/app/sessions
      - ./scripts:/app/scripts
      - ./credentials.json:/app/credentials.json:ro
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@fastgram_db:5432/${POSTGRES_DB}
    depends_on:
      fastgram_db:
        condition: service_healthy
    networks:
      - fastgram_network

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: fastgram_n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5679:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5679/
      - GENERIC_TIMEZONE=Europe/Kyiv
    volumes:
      - fastgram_n8n_data:/home/node/.n8n
    networks:
      - fastgram_network

  fastgram_db:
    image: postgres:15-alpine
    container_name: fastgram_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - fastgram_db_data:/var/lib/postgresql/data
    networks:
      - fastgram_network

networks:
  fastgram_network:
    driver: bridge

volumes:
  fastgram_n8n_data:
  fastgram_db_data:
